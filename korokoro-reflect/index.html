<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ころころリフレクト</title>
    <script>
    !function(){
      var p = location.pathname;
      var dir = p.slice(-1) === '/' ? p : p.substring(0, p.lastIndexOf('/') + 1);
      if (p.slice(-1) !== '/' && !/\.\w+$/.test(p)) dir = p + '/';
      document.write('<link rel="stylesheet" href="' + dir + 'style.css">');
      window.__assetBase = dir;
    }();
    </script>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🧩 ころころリフレクト</h1>
            <div class="status-row">
                <span id="stageText">ステージ 1 / 100</span>
            </div>
            <div class="header-menu">
                <button id="menuBtn" class="secondary menu-toggle" aria-label="メニュー" aria-expanded="false">⚙️</button>
                <div id="menuPanel" class="menu-panel hidden" aria-hidden="true">
                    <button id="stageListBtn" class="secondary menu-item">ステージ一覧</button>
                    <button id="helpBtn" class="secondary menu-item">あそび方</button>
                </div>
            </div>
        </header>

        <main>
            <div id="playArea" class="play-area">
                <div id="fxBadge" class="fx-badge hidden" role="status" aria-live="polite" aria-atomic="true"></div>
            </div>
        </main>

        <footer class="toolbox">
            <div class="tool-row tool-select-row">
                <button id="selectRectBtn" class="tool-btn shape-btn active" aria-label="しかく">
                    <span class="tool-icon rect-icon" aria-hidden="true"></span>
                </button>
                <button id="selectCircleBtn" class="tool-btn shape-btn" aria-label="まる">
                    <span class="tool-icon circle-icon" aria-hidden="true"></span>
                </button>
                <button id="selectStarBtn" class="tool-btn shape-btn" aria-label="ほし">
                    <span class="tool-icon star-icon" aria-hidden="true"></span>
                </button>
            </div>
            <div class="tool-row stock-row">
                <div
                    id="stockMeter"
                    class="stock-meter"
                    role="progressbar"
                    aria-label="のこりブロック"
                    aria-valuemin="0"
                    aria-valuemax="1"
                    aria-valuenow="1"
                >
                    <span id="stockBar" class="stock-meter-fill"></span>
                </div>
                <span id="stockText" class="sr-only">のこり: 1</span>
            </div>
            <div class="tool-row utility-row">
                <button id="deleteBtn" class="tool-btn">削除</button>
                <button id="resetBtn" class="secondary icon-btn reset-icon-btn" aria-label="リセット">
                    <span class="reset-icon" aria-hidden="true">↻</span>
                </button>
            </div>
            <div class="tool-row">
                <button id="startBtn" class="primary">スタート</button>
                <button id="nextBtn" class="primary" disabled>つぎのステージ</button>
            </div>
        </footer>

        <section id="stageSelectModal" class="overlay hidden" aria-hidden="true">
            <div class="overlay-card">
                <h2>ステージ一覧</h2>
                <div id="stageList" class="stage-list"></div>
                <button id="closeStageListBtn" class="secondary">閉じる</button>
            </div>
        </section>

        <section id="helpModal" class="overlay hidden" aria-hidden="true">
            <div class="overlay-card">
                <h2>あそび方</h2>
                <ol class="help-list">
                    <li>下の形アイコンを指でドラッグして、プレイエリアに置きます。</li>
                    <li>置いたブロックはタップで回転、ドラッグで動かせます。</li>
                    <li>削除で配置を調整し、スタートを押します。</li>
                    <li>赤い輪からボールが出て、緑の円に入るとクリアです。</li>
                </ol>
                <button id="closeHelpBtn" class="primary">OK</button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script>document.write('<script src="' + window.__assetBase + 'game.js"><\/script>')</script>
</body>
</html>
