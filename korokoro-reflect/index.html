<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ころころリフレクト</title>
    <script>
    !function(){
      var p = location.pathname;
      var dir = p.slice(-1) === '/' ? p : p.substring(0, p.lastIndexOf('/') + 1);
      if (p.slice(-1) !== '/' && !/\.\w+$/.test(p)) dir = p + '/';
      document.write('<link rel="stylesheet" href="' + dir + 'style.css">');
      window.__assetBase = dir;
    }();
    </script>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🧩 ころころリフレクト</h1>
            <div class="status-row">
                <span id="stageText">ステージ 1 / 3</span>
                <span id="starText">⭐ 0</span>
                <span id="stateText">配置中</span>
            </div>
            <div class="header-buttons">
                <button id="resetBtn" class="secondary">リセット</button>
                <button id="pauseBtn" class="secondary" disabled>一時停止</button>
            </div>
        </header>

        <main>
            <div id="playArea" class="play-area"></div>
            <p id="messageText" class="message">下の「四角」を選んで、プレイエリアをタップして置こう！</p>
        </main>

        <footer class="toolbox">
            <div class="tool-row">
                <button id="selectRectBtn" class="tool-btn active">四角</button>
                <span id="stockText">のこり: 1</span>
            </div>
            <div class="tool-row">
                <button id="rotateBtn" class="tool-btn">回転 +15°</button>
                <button id="deleteBtn" class="tool-btn">削除</button>
            </div>
            <div class="tool-row">
                <button id="startBtn" class="primary">スタート</button>
                <button id="nextBtn" class="primary" disabled>つぎのステージ</button>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script>document.write('<script src="' + window.__assetBase + 'game.js"><\/script>')</script>
</body>
</html>
